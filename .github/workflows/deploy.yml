name: Deploy Website VPS

on:
  push:
    branches:
      - prod
  workflow_dispatch:
    inputs:
      ref:
        description: Branch to deploy to production manually after any required migration step
        required: true
        default: prod

permissions:
  contents: read

jobs:
  deploy-prod:
    if: github.event_name == 'push' && github.ref_name == 'prod'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-website-prod
      cancel-in-progress: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Block schema-sensitive production deploys
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ "$BEFORE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            changed_files="$(git show --pretty='' --name-only "$AFTER_SHA")"
          else
            changed_files="$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA")"
          fi

          printf 'Changed files:\n%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | grep -E '^(src/collections/|src/globals/|src/Footer/|src/Header/|src/payload\.config\.ts$|src/migrations/)' >/dev/null; then
            echo "Production website deploy blocked because schema-sensitive files changed."
            echo "Run ./scripts/vps-db-migrate.sh on the VPS, then trigger the manual workflow dispatch."
            exit 1
          fi

      - name: Configure SSH
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          set -euo pipefail
          SSH_PORT="${DEPLOY_SSH_PORT:-22}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$SSH_PORT" -H "$DEPLOY_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy production website
        env:
          DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
        run: |
          set -euo pipefail
          SSH_PORT="${DEPLOY_SSH_PORT:-22}"
          ssh -p "$SSH_PORT" "$DEPLOY_SSH_USER@$DEPLOY_SSH_HOST" \
            "cd '$DEPLOY_APP_DIR' && ./scripts/deploy-vps.sh --branch prod"

  deploy-prod-manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-website-prod-manual
      cancel-in-progress: false
    steps:
      - name: Configure SSH
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          set -euo pipefail
          SSH_PORT="${DEPLOY_SSH_PORT:-22}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$SSH_PORT" -H "$DEPLOY_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy production website manually
        env:
          DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail
          SSH_PORT="${DEPLOY_SSH_PORT:-22}"
          ssh -p "$SSH_PORT" "$DEPLOY_SSH_USER@$DEPLOY_SSH_HOST" \
            "cd '$DEPLOY_APP_DIR' && ./scripts/deploy-vps.sh --branch '$DEPLOY_REF'"
