services:
  website:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: ${BUILD_DATABASE_URL:?BUILD_DATABASE_URL is required for image build}
      extra_hosts:
        - host.docker.internal:host-gateway
    image: ${COMPOSE_PROJECT_NAME:-hostlink-site}-app:latest
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.production}
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: ${APP_PORT:?APP_PORT is required}
    ports:
      - 127.0.0.1:${APP_PORT:?APP_PORT is required}:${APP_PORT:?APP_PORT is required}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://127.0.0.1:${APP_PORT}${APP_HEALTHCHECK_PATH:-/} || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.production}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - 127.0.0.1:${POSTGRES_EXPOSE_PORT:-5432}:5432
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
